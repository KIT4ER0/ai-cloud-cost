version: "3.9"
services:
  db:
    image: postgres:16
    container_name: ai_cost_db
    restart: always
    environment:
      POSTGRES_DB: ai_cost
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai_user -d ai_cost" ]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_cost_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: ai_cost_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_USER=postgres.gedvftitzptqvyuntgvh
      - DB_PASSWORD=Fxig08xuluj
      - DB_HOST=aws-1-ap-northeast-1.pooler.supabase.com
      - DB_PORT=6543
      - DB_NAME=postgres
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend # dev: แก้โค้ดสดได้
    command: >
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    image: node:22-alpine
    container_name: ai_cost_ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend # dev: แก้ UI สดได้
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
volumes:
  dbdata:
