# ใช้ข้อมูลถึง "เมื่อวาน" เป็นค่ามาตรฐาน (จะถูกแปลงเป็นวันที่จริงในสคริปต์)
as_of: "yesterday"

rules:
  # ---------- EC2 ----------
  EC2_RIGHTSIZE_P95_LOW:
    enabled: true
    window_days: 7            # ดูย้อนหลัง 7 วันจาก core.features
    cpu_p95_lt: 20            # p95 CPU < 20% จัดว่า underutilized
    confidence: 0.80

  EC2_OFFHOURS_STOP:
    enabled: false
    non_prod_tags: ["dev", "test", "staging"]  # พบ tag เหล่านี้ => non-prod
    schedule:
      weekdays_off: "20:00-08:00"              # เวลาปิดกลางคืนวันทำงาน
      weekend: true                            # ปิดทั้งวันในเสาร์-อาทิตย์
    est_hours_stop_month: 500                  # ชม. ที่คาดว่าจะหยุด/เดือนไว้ประเมินออม
    confidence: 0.90

  EC2_SP_COVERAGE_LOW:
    enabled: false            # (ยังไม่ implement ในโค้ดตัวอย่าง)
    coverage_lt_pct: 70
    confidence: 0.70

  EBS_UNATTACHED_AGE:
    enabled: false            # (ยังไม่ implement)
    days_since_detach_gt: 14
    snapshot_required: true
    confidence: 0.95

  EIP_UNASSOCIATED:
    enabled: false            # (ยังไม่ implement)
    confidence: 0.90

  # ---------- S3 ----------
  S3_LIFECYCLE_COLD:
    enabled: true
    cold_days_gt: 60          # ไม่ถูก access > 60 วัน
    min_size_gb: 0            # ขนาดขั้นต่ำที่จะพิจารณา
    confidence: 0.80

  # ---------- RDS ----------
  RDS_RIGHTSIZE_P95_LOW:
    enabled: true
    window_days: 7
    cpu_p95_lt: 20
    confidence: 0.75

  RDS_OFFHOURS_STOP:
    enabled: false            # (ยังไม่ implement)
    non_prod: true
    stoppable: true
    est_hours_stop_month: 500
    confidence: 0.90

  RDS_STORAGE_TIER:
    enabled: false            # (ยังไม่ implement)
    from_type: "gp2"
    to_type: "gp3"
    confidence: 0.85

  RDS_SNAPSHOT_OLD:
    enabled: false            # (ยังไม่ implement)
    manual_snapshot_days_gt: 30
    confidence: 0.95

  # ---------- Lambda ----------
  LAMBDA_OPTIMIZE:
    enabled: true
    duration_p95_ms_gt: 300   # p95 duration > 300ms
    invocations_gt: 1000      # เรียกใช้งานมากพอให้คุ้มค่าปรับจูน
    confidence: 0.60

  LAMBDA_PC_UNUSED:
    enabled: false            # (ยังไม่ implement)
    pc_used_pct_lt: 20
    confidence: 0.80

  LAMBDA_MEMORY_RIGHTSIZE:
    enabled: false            # (ยังไม่ implement)
    mem_config_used_ratio_ge: 1.6
    duration_p95_ms_lt: 2000
    est_saving_ratio: 0.25
    confidence: 0.70

  # ---------- Data Transfer ----------
  DT_INTER_AZ_HIGH:
    enabled: true
    gb_30d_gt: 50             # ปริมาณข้าม AZ ใน 30 วัน > 50GB
    confidence: 0.70

  DT_NAT_EGRESS_S3:
    enabled: false            # (ยังไม่ implement)
    nat_to_s3_gb_30d_gt: 20
    recommend_vpc_gateway_endpoint: true
    confidence: 0.85