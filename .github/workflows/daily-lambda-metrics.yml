name: Daily Lambda Metrics Pull

on:
  schedule:
    # ตี 2 เวลาไทย (UTC+7) = 19:00 UTC วันก่อนหน้า
    - cron: '0 19 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  pull-lambda-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # AWS Platform credentials (for AssumeRole)
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

      # Database (Supabase)
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Pull & Save Lambda Metrics
        run: |
          python -m backend.scripts.run_save_lambdametrics --region us-east-1
